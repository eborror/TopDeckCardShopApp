<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TopDeck - Inventory</title>
    <link rel="stylesheet" href="/static/css/interactionHandlerStyle.css">
</head>

<body>

    <div class="page">

        <!-- LEFT COLUMN -->
        <div class="left">
            <h2>Current Inventory</h2>

            <table>
                <tr>
                    <th>ID</th>
                    <th>Product</th>
                    <th>Price</th>
                    <th>Stock</th>
                </tr>

                {% for p in products %}
                <tr>
                    <td>{{ p.PRODUCT_ID }}</td>
                    <td>{{ p.PRODUCT_NAME }}</td>
                    <td>${{ p.PRODUCT_PRICELISTED }}</td>
                    <td>{{ p.PRODUCT_STOCK }}</td>
                </tr>
                {% endfor %}
            </table>
        </div>

        <!-- RIGHT COLUMN -->
        <div class="right">

            <h2>Inventory Controls</h2>

            <!-- ===================== -->
            <!-- TOP: UPDATE STOCK -->
            <!-- ===================== -->
            <div class="section">
                <h3>Update Existing Stock</h3>

                <form action="/update_stock" method="post">

                    <div class="form-group">
                        <label>Product:</label>
                        <select name="product_id" required>
                            {% for p in products %}
                            <option value="{{ p.PRODUCT_ID }}">
                                {{ p.PRODUCT_NAME }} (Stock: {{ p.PRODUCT_STOCK }})
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Quantity Change:</label>
                        <input type="number" name="quantity" required>
                        <small>Use + to add, - to remove</small>
                    </div>

                    <button type="submit">Update Stock</button>
                </form>
            </div>

            <hr>

            <!-- ===================== -->
            <!-- BOTTOM: ADD PRODUCT -->
            <!-- ===================== -->
            <div class="section">
                <h3>Add New Product</h3>

                <form action="/add_product" method="post">

                    <div class="form-group">
                        <label>Product Name:</label>
                        <input type="text" name="product_name" required>
                    </div>

                    <div class="form-group">
                        <label>Price Bought:</label>
                        <input type="number" step="0.01" name="buy_price" required>
                    </div>

                    <div class="form-group">
                        <label>Price Listed:</label>
                        <input type="number" step="0.01" name="listed_price" required>
                    </div>

                    <div class="form-group">
                        <label>Starting Stock:</label>
                        <input type="number" name="stock" required>
                    </div>

                    <button type="submit">Create Product</button>

                </form>
            </div>

        </div>

    </div>

</body>
</html>
